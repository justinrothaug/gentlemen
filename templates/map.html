<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Map &mdash; Distinguished Gentlemen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dim: #8a6d2b;
            --ink: #0a0a0f;
            --parchment: #f5f0e6;
            --parchment-dark: #e8e0d0;
            --charcoal: #1a1a24;
            --smoke: #2a2a36;
            --mist: #9a96a6;
        }

        body {
            background: var(--ink);
            color: var(--parchment);
            font-family: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── TOP BAR ─── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
            z-index: 1000;
            flex-shrink: 0;
        }

        .top-bar h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .top-bar h1 span {
            color: var(--mist);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            margin-left: 0.75rem;
        }

        .nav-link {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold-dim);
            text-decoration: none;
            border: 1px solid var(--gold-dim);
            padding: 0.4rem 1rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.08);
        }

        /* ─── MAP ─── */
        #map {
            flex: 1;
            z-index: 1;
        }

        /* Override Leaflet controls for dark theme */
        .leaflet-control-zoom a {
            background: var(--charcoal) !important;
            color: var(--gold) !important;
            border-color: rgba(201, 168, 76, 0.2) !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--smoke) !important;
        }

        .leaflet-control-attribution {
            background: rgba(10, 10, 15, 0.8) !important;
            color: var(--mist) !important;
            font-size: 9px !important;
        }

        .leaflet-control-attribution a {
            color: var(--gold-dim) !important;
        }

        /* ─── CUSTOM MARKERS ─── */
        .dg-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            background: rgba(10, 10, 15, 0.9);
            color: var(--gold);
            font-size: 14px;
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.3), 0 2px 8px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dg-marker:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.5), 0 2px 12px rgba(0,0,0,0.6);
        }

        .dg-marker.type-restaurant { border-color: #c9a84c; }
        .dg-marker.type-bar { border-color: #a87c3c; }
        .dg-marker.type-club { border-color: #d4af37; }
        .dg-marker.type-other { border-color: #8a6d2b; }

        /* Trophy marker — 2x size */
        .dg-marker.trophy {
            width: 64px;
            height: 64px;
            font-size: 30px;
            border-color: #d4af37;
            border-width: 3px;
            background: rgba(10, 10, 15, 0.95);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.15), 0 4px 12px rgba(0,0,0,0.6);
            animation: trophy-glow 3s ease-in-out infinite;
        }

        .dg-marker.trophy:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.7), 0 0 60px rgba(212, 175, 55, 0.25), 0 4px 16px rgba(0,0,0,0.7);
        }

        @keyframes trophy-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.15), 0 4px 12px rgba(0,0,0,0.6); }
            50% { box-shadow: 0 0 28px rgba(212, 175, 55, 0.65), 0 0 50px rgba(212, 175, 55, 0.25), 0 4px 14px rgba(0,0,0,0.65); }
        }

        /* Trophy popup */
        .trophy-popup {
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--parchment-dark);
            min-width: 260px;
            max-width: 320px;
            text-align: center;
        }

        .trophy-popup .trophy-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--gold);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }

        .trophy-popup .trophy-icon-large {
            font-size: 2.5rem;
            margin: 0.5rem 0;
        }

        .trophy-popup .trophy-record {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: var(--gold-light);
            letter-spacing: 0.08em;
            margin: 0.6rem 0;
        }

        .trophy-popup .trophy-winner {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 600;
        }

        .trophy-popup .trophy-image-placeholder {
            width: 100%;
            height: 160px;
            margin-top: 0.6rem;
            border: 2px dashed rgba(201, 168, 76, 0.25);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-dim);
            font-style: italic;
            font-size: 0.8rem;
            background: rgba(201, 168, 76, 0.03);
        }

        /* Multi-event markers get a ring */
        .dg-marker.multi {
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.3), 0 0 0 3px rgba(201, 168, 76, 0.15), 0 2px 8px rgba(0,0,0,0.5);
        }

        /* ─── POPUPS ─── */
        .leaflet-popup-content-wrapper {
            background: rgba(18, 18, 28, 0.97) !important;
            border: 1px solid rgba(201, 168, 76, 0.25) !important;
            border-radius: 3px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(201, 168, 76, 0.08) !important;
        }

        .leaflet-popup-tip {
            background: rgba(18, 18, 28, 0.97) !important;
            border: 1px solid rgba(201, 168, 76, 0.25) !important;
            border-top: none !important;
            border-left: none !important;
        }

        .leaflet-popup-close-button {
            color: var(--gold-dim) !important;
            font-size: 18px !important;
        }

        .leaflet-popup-close-button:hover {
            color: var(--gold) !important;
        }

        .popup-content {
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--parchment-dark);
            min-width: 220px;
            max-width: 300px;
        }

        .popup-name {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 0.4rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
        }

        .popup-type {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--mist);
            background: rgba(201, 168, 76, 0.08);
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            margin-bottom: 0.6rem;
        }

        .popup-event {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .popup-event:last-child { border-bottom: none; }

        .popup-dinner {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--gold-light);
            letter-spacing: 0.05em;
        }

        .popup-meta {
            font-size: 0.8rem;
            color: var(--mist);
            margin-top: 0.2rem;
        }

        .popup-meta .date {
            color: var(--gold-dim);
            font-weight: 600;
        }

        .popup-meta .role {
            font-style: italic;
            opacity: 0.7;
        }

        .popup-note {
            font-size: 0.8rem;
            color: var(--parchment-dark);
            font-style: italic;
            margin-top: 0.3rem;
            padding-left: 0.5rem;
            border-left: 2px solid rgba(201, 168, 76, 0.2);
        }

        .popup-visit-count {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            color: var(--gold-dim);
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
            text-align: right;
        }

        /* ─── LEGEND ─── */
        .map-legend {
            position: fixed;
            bottom: 2rem;
            left: 1rem;
            background: rgba(10, 10, 15, 0.92);
            border: 1px solid rgba(201, 168, 76, 0.15);
            padding: 0.75rem 1rem;
            z-index: 500;
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--mist);
        }

        .map-legend h3 {
            color: var(--gold-dim);
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.3rem 0;
        }

        .legend-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid;
            background: rgba(10, 10, 15, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            flex-shrink: 0;
        }

        /* ─── STATS BAR ─── */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 0.4rem 1rem;
            background: rgba(10, 10, 15, 0.95);
            border-top: 1px solid rgba(201, 168, 76, 0.08);
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--gold-dim);
            flex-shrink: 0;
        }

        .stat-num {
            color: var(--gold);
            font-size: 0.75rem;
            margin-right: 0.3rem;
        }

        @media (max-width: 640px) {
            .top-bar { padding: 0.5rem 0.75rem; }
            .top-bar h1 { font-size: 0.85rem; }
            .top-bar h1 span { display: none; }
            .map-legend { bottom: 3rem; padding: 0.5rem 0.75rem; }
            .stats-bar { gap: 1rem; font-size: 0.5rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>The Map <span>Distinguished Gentlemen</span></h1>
    <a href="/" class="nav-link">&larr; The Book</a>
</div>

<div id="map"></div>

<div class="stats-bar">
    <div><span class="stat-num">{{ venues|length }}</span>Venues</div>
    <div><span class="stat-num">{{ total_events }}</span>Events</div>
    <div><span class="stat-num">2022&ndash;2025</span>Era</div>
</div>

<div class="map-legend">
    <h3>Legend</h3>
    <div class="legend-item">
        <div class="legend-icon" style="border-color:#c9a84c; color:#c9a84c;">&#127860;</div>
        <span>Restaurant</span>
    </div>
    <div class="legend-item">
        <div class="legend-icon" style="border-color:#a87c3c; color:#a87c3c;">&#127867;</div>
        <span>Bar / Lounge</span>
    </div>
    <div class="legend-item">
        <div class="legend-icon" style="border-color:#d4af37; color:#d4af37;">&#9670;</div>
        <span>Club / Venue</span>
    </div>
    <div class="legend-item">
        <div class="legend-icon" style="border-color:#d4af37; color:#d4af37; font-size:11px;">&#127942;</div>
        <span>DG Trophy</span>
    </div>
</div>

<script>
const venues = {{ venues_json|safe }};

// ─── Map Init ───
const map = L.map('map', {
    center: [37.7930, -122.4150],
    zoom: 14,
    zoomControl: true,
    attributionControl: true,
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19,
}).addTo(map);

// ─── Icon Map ───
const typeIcons = {
    restaurant: '\u{1F374}',
    bar: '\u{1F378}',
    club: '\u2666',
    other: '\u2726',
};

// ─── Build Markers ───
venues.forEach(venue => {
    const icon = typeIcons[venue.type] || '\u2726';
    const multiClass = venue.events.length > 1 ? ' multi' : '';

    const marker = L.marker([venue.lat, venue.lng], {
        icon: L.divIcon({
            className: '',
            html: `<div class="dg-marker type-${venue.type}${multiClass}">${icon}</div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -18],
        }),
    }).addTo(map);

    // Build popup
    let eventsHtml = venue.events.map(ev => {
        let html = `<div class="popup-event">`;
        html += `<div class="popup-dinner">${ev.dinner}</div>`;
        html += `<div class="popup-meta"><span class="date">${ev.date}</span> &bull; <span class="role">${ev.role}</span>`;
        if (ev.dg) html += ` &bull; ${ev.dg}`;
        html += `</div>`;
        if (ev.note) html += `<div class="popup-note">${ev.note}</div>`;
        html += `</div>`;
        return html;
    }).join('');

    const visitText = venue.events.length > 1
        ? `${venue.events.length} visits`
        : '1 visit';

    const popupHtml = `
        <div class="popup-content">
            <div class="popup-name">${venue.name}</div>
            <div class="popup-type">${venue.type}</div>
            ${eventsHtml}
            <div class="popup-visit-count">${visitText}</div>
        </div>
    `;

    marker.bindPopup(popupHtml, { maxWidth: 320 });
});

// ─── DG Trophy Marker ───
const trophyMarker = L.marker([37.7981, -122.4208], {
    icon: L.divIcon({
        className: '',
        html: `<div class="dg-marker trophy">&#127942;</div>`,
        iconSize: [64, 64],
        iconAnchor: [32, 32],
        popupAnchor: [0, -34],
    }),
    zIndexOffset: 1000,
}).addTo(map);

const trophyPopupHtml = `
    <div class="trophy-popup">
        <div class="trophy-title">The DG Trophy</div>
        <div class="trophy-icon-large">&#127942;</div>
        <div class="trophy-record">2026 DG March Games Winner</div>
        <div class="trophy-winner">Mickey</div>
        <div class="trophy-image-placeholder">
            <span>&#9670; Photo Coming Soon &#9670;</span>
        </div>
    </div>
`;

trophyMarker.bindPopup(trophyPopupHtml, { maxWidth: 340 });
</script>

</body>
</html>
