<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Distinguished Gentlemen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dim: #8a6d2b;
            --ink: #0a0a0f;
            --parchment: #f5f0e6;
            --charcoal: #1a1a24;
            --smoke: #2a2a36;
            --mist: #9a96a6;
        }

        body {
            background: var(--ink);
            color: var(--parchment);
            font-family: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(201, 168, 76, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(201, 168, 76, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .home {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .ornament {
            color: var(--gold-dim);
            font-size: 1.4rem;
            letter-spacing: 1.2em;
            margin-bottom: 2rem;
            font-family: 'Cinzel', serif;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: var(--gold);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 0 60px rgba(201, 168, 76, 0.12);
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--mist);
            font-size: 1.15rem;
            margin-top: 0.75rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
        }

        .est {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.35rem 2rem;
            border: 1px solid var(--gold-dim);
            color: var(--gold-dim);
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
        }

        .quote {
            max-width: 500px;
            margin: 2.5rem auto 0;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--mist);
            line-height: 1.6;
            opacity: 0.6;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 3rem auto;
        }

        /* ─── NAV CARDS ─── */
        .nav-cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .nav-card {
            display: block;
            text-decoration: none;
            width: 240px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(201, 168, 76, 0.15);
            background: rgba(26, 26, 36, 0.4);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-card:hover {
            border-color: rgba(201, 168, 76, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 30px rgba(201, 168, 76, 0.06);
        }

        .nav-card:hover::before { opacity: 1; }

        .nav-card-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            display: block;
        }

        .nav-card-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .nav-card-desc {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            color: var(--mist);
            font-style: italic;
            letter-spacing: 0.05em;
            position: relative;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: var(--gold-dim);
            opacity: 0.3;
        }
    </style>
</head>
<body>

<div class="home">
    <div class="ornament">&diams;&diams;&diams;</div>
    <h1>The<br>Distinguished<br>Gentlemen</h1>
    <div class="subtitle">San Francisco</div>
    <div class="est">EST. 2022 &nbsp;&bull;&nbsp; D/G</div>

    <div class="quote">
        &ldquo;A Gentleman is one who puts more into the world than he takes out&rdquo; &mdash; G.B. Shaw
    </div>

    <div class="divider"></div>

    <nav class="nav-cards">
        <a href="/book" class="nav-card">
            <span class="nav-card-icon">&#9670;</span>
            <div class="nav-card-title">The Book</div>
            <div class="nav-card-desc">42 pages of charter, recaps &amp; lore</div>
        </a>
        <a href="/map" class="nav-card">
            <span class="nav-card-icon">&#9733;</span>
            <div class="nav-card-title">The Map</div>
            <div class="nav-card-desc">Every venue across the city</div>
        </a>
    </nav>
</div>

<footer>&diams; The Distinguished Gentlemen &bull; San Francisco &diams;</footer>

</body>
</html>
